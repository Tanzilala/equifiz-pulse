name: Daily Pulse

on:
  # NOTE: cron disabled — NSE blocks GitHub's US/EU datacenter IPs (403).
  # Daily auto-post runs on the Hostinger VPS in Mumbai (Indian IP) instead.
  # See scripts/deploy-vps.sh.  Manual triggers from the Actions tab still work.
  workflow_dispatch:
    inputs:
      only:
        description: 'Restrict to one channel (linkedin / telegram / whatsapp)'
        required: false
        default: ''

permissions:
  contents: read

concurrency:
  group: daily-pulse
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.12

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Run pulse
        env:
          N8N_TELEGRAM_WEBHOOK: ${{ secrets.N8N_TELEGRAM_WEBHOOK }}
          N8N_LINKEDIN_WEBHOOK: ${{ secrets.N8N_LINKEDIN_WEBHOOK }}
          N8N_WHATSAPP_WEBHOOK: ${{ secrets.N8N_WHATSAPP_WEBHOOK }}
          EQUIFIZ_PULSE_URL:    ${{ secrets.EQUIFIZ_PULSE_URL }}
        run: |
          if [ -n "${{ inputs.only }}" ]; then
            uv run pulse run --only "${{ inputs.only }}" --confirm
          else
            uv run pulse run --only telegram --confirm
          fi

      - name: Upload run log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pulse-log-${{ github.run_id }}
          path: logs/
          retention-days: 30
          if-no-files-found: ignore
